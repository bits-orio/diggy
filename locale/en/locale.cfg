[mod-setting-description]
diggy-carve-out-radius=Radius of the pre-revealed safe area at spawn. Requires a new map.
diggy-evolution-per-dig=Enemy evolution added on this surface for every rock dug. Greed makes the caves meaner.
diggy-dig-biter-chance=Chance that a dig spawns biters in the revealed space. Hostiles never exist until dug up.
diggy-dig-nest-chance=Chance that a dig spawns a nest or worm in the revealed space (falls back to biters in tight tunnels).
diggy-enemy-expansion=Let nests expand on their own. Off by default so digging stays the only source of nests.
diggy-treasure-chance=Chance that a dig uncovers a sealed loot chest. Locations are fixed per map seed; contents scale with depth.
diggy-cavern-worm-multiplier=Scales how many worms guard cavern nest rooms (base 2-4). Zero disables worms in caverns.
diggy-crushed-remains=When enabled, buildings crushed by collapses leave a buried corpse holding their inventories — dig it out to recover the materials. When disabled (default), crushed buildings and contents are destroyed.
diggy-cavern-chance=Chance that a dig breaches a cavern tunnel. Caverns are fixed per map seed; deeper rooms hold nests, hoards, or rare sanctuaries.
diggy-collapse-enabled=Unsupported ceilings cave in. Support them with remaining wall, stone walls, and stone/concrete flooring.
diggy-wall-support=Ceiling support strength of a stone wall, before any research. The default (5) holds a pillar grid with 3-tile gaps comfortably; the original Diggy scenario used 3. Applies immediately when changed.
diggy-strut-strength-max=How much stronger each wall's total support becomes at MAX Support Struts research, on top of the longer reach (intermediate tiers scale in between). 1 = research extends reach only. Applies immediately when changed.
diggy-wall-crowding=Touching walls share the load path: each adjacent wall divides a wall's ceiling support by (1 + this x neighbours). Spaced pillars are unaffected; solid wall lines stop multiplying support. 0 disables. Applies immediately when changed.

