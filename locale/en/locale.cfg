vein-discovered=__1__ [color=yellow]__2__[/color] vein discovered!
cavern-breached=[color=orange]The rock gives way — a tunnel opens ahead![/color]
cavern-room-breached=[color=orange]The rock gives way — your digging breaches a cavern![/color]
cave-collapse=[color=red]Cave collapse![/color]
cave-collapse-other=__1__ suffered a cave collapse!
mother-emerges=[color=red]A monstrous screech echoes through the caves — a Mother has emerged![/color]
big-mother-emerges=[color=red]The ground shakes. Something enormous has woken beneath your feet.[/color]
