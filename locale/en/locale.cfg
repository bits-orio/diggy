[entity-name]
diggy-rock=Solid rock
diggy-tree=Dense thicket

[entity-description]
diggy-rock=The undug world. Mine it to reveal what lies beneath — and mind the ceiling.
diggy-tree=Overgrown cover. Quicker to clear than rock — but it burns.

[mod-setting-name]
diggy-carve-out-radius=Spawn carve-out radius
diggy-evolution-per-dig=Evolution per dig
diggy-dig-biter-chance=Biter chance per dig
diggy-dig-nest-chance=Nest chance per dig
diggy-enemy-expansion=Allow biter expansion
diggy-treasure-chance=Treasure chance per dig

[mod-setting-description]
diggy-carve-out-radius=Radius of the pre-revealed safe area at spawn. Requires a new map.
diggy-evolution-per-dig=Enemy evolution added on this surface for every rock dug. Greed makes the caves meaner.
diggy-dig-biter-chance=Chance that a dig spawns biters in the revealed space. Hostiles never exist until dug up.
diggy-dig-nest-chance=Chance that a dig spawns a nest or worm in the revealed space (falls back to biters in tight tunnels).
diggy-enemy-expansion=Let nests expand on their own. Off by default so digging stays the only source of nests.
diggy-treasure-chance=Chance that a dig uncovers a sealed loot chest. Locations are fixed per map seed; contents scale with depth.

[diggy]
mid-save-install=[color=red]Diggy was added to an existing save. The world can only be generated on a brand-new map — Diggy is disabled here.[/color]
vein-discovered=__1__ [color=yellow]__2__[/color] vein discovered!
