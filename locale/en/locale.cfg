cracking-sound-2=KRRRR

[technology-name]
diggy-dig-speed=Dig speed
diggy-support-reach=Support struts

[technology-description]
diggy-dig-speed-exact=Your miners learn to move more rock: +__1__% manual mining speed for the whole team. Total with all previous tiers: +__2__%.
diggy-support-reach-exact=Better struts and bracing: newly placed walls and reactors support the ceiling __2__ tiles around, up from __1__. Pillars can stand one tile further apart. Existing supports keep their old reach until rebuilt.

[technology-effect]
diggy-support-reach-exact=Support reach of new walls and reactors: __1__ → __2__ tiles
